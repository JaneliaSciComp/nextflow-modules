# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: spots_rsfish
description: Precise, interactive, fast, and scalable FISH spot detection
keywords:
  - spatial transcriptomics
  - spatial genomics
  - FISH
  - Spark
components: []
input:
  - ch_meta:
      type: tuple
      description: |
        Channel of tuples containing a meta map and spot detection parameters.
        Structure: [ val(meta), path(input_image), val(input_dataset), path(spots_output_dir), val(spots_result_name), val(spots_channels), val(spark) ]
        - meta: map with sample metadata (must include 'id')
        - input_image: path to the input N5/Zarr image
        - input_dataset: dataset path within the image container
        - spots_output_dir: output directory for spot results (staged as 'spots/*')
        - spots_result_name: name of the output CSV file; defaults to '<meta.id>-points.csv' if empty
        - spots_channels: comma-separated list of channel indices to include; if empty all channels are used
        - spark: map with Spark cluster configuration (uri, work_dir, parallelism, executor_cores, executor_memory, driver_cores, driver_memory)
output:
  - params:
      type: tuple
      description: |
        Tuple echoing back key parameters for downstream chaining.
        Structure: [ val(meta), env(INPUT_IMG), val(input_dataset), path(spots_output_dir), val(spots_result_name), val(spark) ]
  - csv:
      type: tuple
      description: |
        Tuple of the meta map and the full path to the output CSV file produced by RS-FISH.
        Structure: [ val(meta), env(full_output_filename) ]
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@krokicki"
  - "@cgoina"
